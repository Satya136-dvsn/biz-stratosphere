global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: '/metrics'

  - job_name: 'ml-inference'
    static_configs:
      - targets: ['ml-inference:8001']
    metrics_path: '/metrics'

  - job_name: 'llm-orchestrator'
    static_configs:
      - targets: ['llm-orchestrator:8002']
    metrics_path: '/metrics'

  - job_name: 'rag-service'
    static_configs:
      - targets: ['rag-service:8003']
    metrics_path: '/metrics'

  - job_name: 'embedding-worker'
    static_configs:
      - targets: ['embedding-worker:8004']
    metrics_path: '/metrics'

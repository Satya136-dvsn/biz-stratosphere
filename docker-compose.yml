version: '3.8'

# ══════════════════════════════════════════════════════════════════════════════
# Biz Stratosphere – Phase 5: Inter-Service Reliability Hardened Compose
# All services expose /health and /ready endpoints.
# Circuit breakers and timeout policies are enforced at the application layer.
# ══════════════════════════════════════════════════════════════════════════════

x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 4
  start_period: 20s

x-shared-env: &shared-env
  DATABASE_URL: ${DATABASE_URL}

services:

  # ────────────────────────────────
  # API Gateway (:8000)
  # ────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: biz-gateway
    ports:
      - "8000:8000"
    depends_on:
      - ml-inference
      - llm-orchestrator
      - rag-service
    environment:
      <<: *shared-env
      ML_INFERENCE_URL: http://ml-inference:8001
      LLM_ORCHESTRATOR_URL: http://llm-orchestrator:8002
      RAG_SERVICE_URL: http://rag-service:8003
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ────────────────────────────────
  # ML Inference Service (:8001)
  # ────────────────────────────────
  ml-inference:
    build:
      context: ./backend
      dockerfile: ml-inference/Dockerfile
    container_name: biz-ml
    ports:
      - "8001:8001"
    environment:
      <<: *shared-env
      MODELS_DIR: /app/models
    restart: unless-stopped
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      start_period: 30s     # Models may need time to load
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ────────────────────────────────
  # LLM Orchestrator (:8002)
  # ────────────────────────────────
  llm-orchestrator:
    build:
      context: ./backend
      dockerfile: llm-orchestrator/Dockerfile
    container_name: biz-llm
    ports:
      - "8002:8002"
    depends_on:
      ollama:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      RAG_SERVICE_URL: http://rag-service:8003
      ML_INFERENCE_URL: http://ml-inference:8001
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ────────────────────────────────
  # RAG Retrieval Service (:8003)
  # ────────────────────────────────
  rag-service:
    build:
      context: ./backend
      dockerfile: rag-service/Dockerfile
    container_name: biz-rag
    ports:
      - "8003:8003"
    environment:
      <<: *shared-env
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ────────────────────────────────
  # Embedding Worker (:8004)
  # ────────────────────────────────
  embedding-worker:
    build:
      context: ./backend
      dockerfile: embedding-worker/Dockerfile
    container_name: biz-embedder
    ports:
      - "8004:8004"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      <<: *shared-env
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G

  # ────────────────────────────────
  # Ollama – Local LLM Server
  # ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: biz-ollama
    # ports:
    #   - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G

  # ────────────────────────────────
  # Airflow – ETL Orchestration
  # ────────────────────────────────
  postgres-airflow:
    image: postgres:14
    container_name: biz-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.8.0-python3.11
    container_name: biz-airflow-ui
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./etl:/opt/airflow/dags/etl
      - ./ml:/opt/airflow/dags/ml
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
               airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.11
    container_name: biz-airflow-scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./etl:/opt/airflow/dags/etl
      - ./ml:/opt/airflow/dags/ml
    command: airflow scheduler

  # ════════════════════════════════════════════
  # OBSERVABILITY STACK (Phase 6)
  # ════════════════════════════════════════════

  # ────────────────────────────────
  # Prometheus (:9090)
  # ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: biz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ────────────────────────────────
  # Grafana (:3001)
  # ────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: biz-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ────────────────────────────────
  # Jaeger (:16686 UI, :4317 OTLP)
  # ────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: biz-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16687/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  airflow-db:
  ollama_data:
  prometheus_data:
  grafana_data:

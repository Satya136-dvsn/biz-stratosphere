version: '3.8'

# ══════════════════════════════════════════════════════════════════════════════
# Biz Stratosphere – Phase 5: Inter-Service Reliability Hardened Compose
# All services expose /health and /ready endpoints.
# Circuit breakers and timeout policies are enforced at the application layer.
# ══════════════════════════════════════════════════════════════════════════════

x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 4
  start_period: 20s

x-shared-env: &shared-env
  DATABASE_URL: ${DATABASE_URL}

services:

  # ────────────────────────────────
  # API Gateway (:8000)
  # ────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: biz-gateway
    ports:
      - "8000:8000"
    depends_on:
      ml-inference:
        condition: service_healthy
      llm-orchestrator:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    environment:
      <<: *shared-env
      ML_INFERENCE_URL: http://ml-inference:8001
      LLM_ORCHESTRATOR_URL: http://llm-orchestrator:8002
      RAG_SERVICE_URL: http://rag-service:8003
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ────────────────────────────────
  # ML Inference Service (:8001)
  # ────────────────────────────────
  ml-inference:
    build:
      context: ./backend/ml-inference
      dockerfile: Dockerfile
    container_name: biz-ml
    ports:
      - "8001:8001"
    environment:
      <<: *shared-env
      MODELS_DIR: /app/models
    restart: unless-stopped
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      start_period: 30s     # Models may need time to load
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ────────────────────────────────
  # LLM Orchestrator (:8002)
  # ────────────────────────────────
  llm-orchestrator:
    build:
      context: ./backend/llm-orchestrator
      dockerfile: Dockerfile
    container_name: biz-llm
    ports:
      - "8002:8002"
    depends_on:
      ollama:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      RAG_SERVICE_URL: http://rag-service:8003
      ML_INFERENCE_URL: http://ml-inference:8001
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ────────────────────────────────
  # RAG Retrieval Service (:8003)
  # ────────────────────────────────
  rag-service:
    build:
      context: ./backend/rag-service
      dockerfile: Dockerfile
    container_name: biz-rag
    ports:
      - "8003:8003"
    environment:
      <<: *shared-env
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ────────────────────────────────
  # Embedding Worker (:8004)
  # ────────────────────────────────
  embedding-worker:
    build:
      context: ./backend/embedding-worker
      dockerfile: Dockerfile
    container_name: biz-embedder
    ports:
      - "8004:8004"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      <<: *shared-env
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
    restart: unless-stopped
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G

  # ────────────────────────────────
  # Ollama – Local LLM Server
  # ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: biz-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G

  # ────────────────────────────────
  # Airflow – ETL Orchestration
  # ────────────────────────────────
  postgres-airflow:
    image: postgres:14
    container_name: biz-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.8.0-python3.11
    container_name: biz-airflow-ui
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./etl:/opt/airflow/dags/etl
      - ./ml:/opt/airflow/dags/ml
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
               airflow webserver"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.11
    container_name: biz-airflow-scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./etl:/opt/airflow/dags/etl
      - ./ml:/opt/airflow/dags/ml
    command: airflow scheduler

volumes:
  airflow-db:
  ollama_data:

name: CI Pipeline

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master]

jobs:
  backend-quality:
    name: Backend Quality & Tests (Unified)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -r backend/requirements-ci.txt

      - name: Lint with Ruff
        run: |
          # Lint the entire backend directory
          ruff check backend/ --select E9,F63,F7,F82 --target-version py311
          ruff check backend/ --exit-zero --statistics

      - name: Run Resilience Tests (Virtual)
        run: |
          # Run the virtual test suite for circuit breakers and retries
          python backend/phase5_virtual_test.py

      - name: Verify Service Imports
        run: |
          # Verify each microservice is importable and ready
          python -m pytest backend/tests/test_imports.py -v
